name: build

on:
  push:
    tags:
      - '*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Linux binaries in manylinux2014
      run: |
        docker run --rm \
          -v "$PWD":/io \
          -w /io \
          quay.io/pypa/manylinux2014_x86_64 \
          /bin/bash -lc '
            yum -y install glibc-devel.i686 libgcc.i686 curl

            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
            source "$HOME/.cargo/env"

            rustup target add x86_64-unknown-linux-gnu
            rustup target add i686-unknown-linux-gnu

            cargo build --release --target i686-unknown-linux-gnu
            cargo build --release --target x86_64-unknown-linux-gnu

            strip target/i686-unknown-linux-gnu/release/libgm_maxminddb_geoip.so
            strip target/x86_64-unknown-linux-gnu/release/libgm_maxminddb_geoip.so

            mv target/i686-unknown-linux-gnu/release/libgm_maxminddb_geoip.so target/i686-unknown-linux-gnu/release/gmsv_maxminddb_geoip_linux.dll
            mv target/x86_64-unknown-linux-gnu/release/libgm_maxminddb_geoip.so target/x86_64-unknown-linux-gnu/release/gmsv_maxminddb_geoip_linux64.dll
          '

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/i686-unknown-linux-gnu/release/gmsv_maxminddb_geoip_linux.dll
          target/x86_64-unknown-linux-gnu/release/gmsv_maxminddb_geoip_linux64.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install stable toolchain
      run: |
        rustup toolchain install stable
        rustup default stable

    - name: Add targets
      run: rustup target add x86_64-pc-windows-msvc && rustup target add i686-pc-windows-msvc

    - name: Build 64-bit
      run: cargo build --release --target x86_64-pc-windows-msvc
      env:
        RUSTFLAGS: -Ctarget-feature=+crt-static

    - name: Build 32-bit
      run: cargo build --release --target i686-pc-windows-msvc
      env:
        RUSTFLAGS: -Ctarget-feature=+crt-static

    - name: Rename binaries
      run: |
        mv target/i686-pc-windows-msvc/release/gm_maxminddb_geoip.dll target/i686-pc-windows-msvc/release/gmsv_maxminddb_geoip_win32.dll
        mv target/x86_64-pc-windows-msvc/release/gm_maxminddb_geoip.dll target/x86_64-pc-windows-msvc/release/gmsv_maxminddb_geoip_win64.dll

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          target/i686-pc-windows-msvc/release/gmsv_maxminddb_geoip_win32.dll
          target/x86_64-pc-windows-msvc/release/gmsv_maxminddb_geoip_win64.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}