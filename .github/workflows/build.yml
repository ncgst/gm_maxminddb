name: build

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib libc6-dev-i386

    - name: Install stable toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Add Linux targets
      run: |
        rustup target add i686-unknown-linux-gnu
        rustup target add x86_64-unknown-linux-gnu

    - name: Build Linux 32-bit
      run: cargo build --release --target i686-unknown-linux-gnu

    - name: Build Linux 64-bit
      run: cargo build --release --target x86_64-unknown-linux-gnu

    - name: Strip debug symbols
      run: |
        strip target/i686-unknown-linux-gnu/release/libgm_maxminddb_geoip.so
        strip target/x86_64-unknown-linux-gnu/release/libgm_maxminddb_geoip.so

    - name: Rename Linux binaries
      run: |
        mkdir -p dist
        cp target/i686-unknown-linux-gnu/release/libgm_maxminddb_geoip.so dist/gmsv_maxminddb_geoip_linux.dll
        cp target/x86_64-unknown-linux-gnu/release/libgm_maxminddb_geoip.so dist/gmsv_maxminddb_geoip_linux64.dll

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-binaries
        path: |
          dist/gmsv_maxminddb_geoip_linux.dll
          dist/gmsv_maxminddb_geoip_linux64.dll

  build_windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install stable toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable

    - name: Add Windows targets
      run: |
        rustup target add x86_64-pc-windows-msvc
        rustup target add i686-pc-windows-msvc

    - name: Build Windows 64-bit
      run: cargo build --release --target x86_64-pc-windows-msvc
      env:
        RUSTFLAGS: -Ctarget-feature=+crt-static

    - name: Build Windows 32-bit
      run: cargo build --release --target i686-pc-windows-msvc
      env:
        RUSTFLAGS: -Ctarget-feature=+crt-static

    - name: Rename Windows binaries
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist | Out-Null
        Copy-Item target/i686-pc-windows-msvc/release/gm_maxminddb_geoip.dll dist/gmsv_maxminddb_geoip_win32.dll
        Copy-Item target/x86_64-pc-windows-msvc/release/gm_maxminddb_geoip.dll dist/gmsv_maxminddb_geoip_win64.dll

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-binaries
        path: |
          dist/gmsv_maxminddb_geoip_win32.dll
          dist/gmsv_maxminddb_geoip_win64.dll

  release:
    runs-on: ubuntu-latest
    needs:
      - build_linux
      - build_windows

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-binaries'
        path: dist
        merge-multiple: true

    - name: Show release files
      run: ls -la dist

    - name: Create draft release with all assets
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${GITHUB_REF_NAME}" dist/* \
          --title "${GITHUB_REF_NAME}" \
          --draft \
          --verify-tag

    - name: Publish release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release edit "${GITHUB_REF_NAME}" --draft=false